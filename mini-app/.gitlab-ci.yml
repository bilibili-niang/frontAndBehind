# 测试分支专属cicd逻辑

# 仅在 test 分支打包测试产物（使用 Runner 标签：test）

variables:
  # 提升 Node 堆内存上限，配合关闭 sourcemap 防止 OOM
  NODE_OPTIONS: "--max-old-space-size=5096"

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "test"
      when: always
    - when: never

stages:
  - build_test

before_script:
  - |
    set -Eeuo pipefail
    set -x
    export PATH="/usr/local/bin:$PATH"
    echo "Node: $(node -v)" || true
    echo "pnpm: $(pnpm -v)" || true
    # 拉取源码改为在 job 脚本内手动 clone，避免 Runner get_sources 阶段触发 EBADMSG

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - workspace/.pnpm-store/

# 构建前执行 Lint，独立 job，失败则阻止后续阶段

# 构建测试环境：apps/admin 的 test 包
admin_build_test:
  stage: build_test
  tags:
    - yesongTest
  variables:
    # 让 Runner 跳过获取源码，我们在脚本中手动 clone 到干净目录
    GIT_STRATEGY: "none"
  rules:
    - if: $CI_COMMIT_BRANCH == "test"
      changes:
        - apps/admin/*
        - apps/admin/**/*
        - packages/*
        - packages/**/*
      when: on_success
  script:
    # 手动克隆到全新工作目录，精确获取当前提交，避免 shallow clone 导致 checkout 失败
    - rm -rf workspace || true
    - git init workspace
    - cd workspace
    - git remote add origin "$CI_REPOSITORY_URL"
    - git fetch --no-tags --depth=1 origin "$CI_COMMIT_SHA" || git fetch --no-tags --depth=50 origin "$CI_COMMIT_REF_NAME"
    - git checkout -q "$CI_COMMIT_SHA" || git checkout -q "$CI_COMMIT_REF_NAME"
    - test -f .gitlab-ci-test.sh || { echo "当前提交缺少 .gitlab-ci-test.sh，列出根目录："; ls -la; }
    - chmod +x .gitlab-ci-test.sh
    - bash .gitlab-ci-test.sh
  artifacts:
    name: "admin-test-dist-${CI_COMMIT_SHORT_SHA}"
    paths:
      - workspace/apps/admin/dist/
    expire_in: 1 week
  environment:
    name: test