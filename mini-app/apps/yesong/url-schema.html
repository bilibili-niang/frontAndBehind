    <style>
      body,
      html {
        padding: 0;
        margin: 0;
        background-color: #fff;
      }
      body {
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      body::before,
      body::after {
        content: '';
        width: 100%;
        flex: 1;
      }
      body::after {
        flex: 2;
      }
      .apps {
        display: flex;
        justify-content: center;
      }
      .app {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .logo {
        width: 77px;
        height: 77px;
        background-color: #f3f3f3;
        border-radius: 16px;
        background-size: 100% 100%;
      }
      .logo svg {
        width: 100%;
        height: 100%;
      }
      .app .name {
        font-size: 15px;
        margin-top: 12px;
      }
      .dots {
        display: flex;
        align-items: center;
        padding-bottom: 30px;
        margin: 0 20px;
      }
      .dots i {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background-color: #000;
        margin: 0 5px;
        animation: dot 0.9s infinite;
      }
      .dots i:nth-child(2) {
        animation-delay: -0.6s;
      }
      .dots i:nth-child(3) {
        animation-delay: -0.3s;
      }
      @keyframes dot {
        0%,
        100% {
          background-color: #c9c9c9;
        }
        50% {
          background-color: #9b9b9b;
        }
      }
      .tip {
        font-size: 17px;
        font-weight: 500;
        margin-top: 26px;
      }
      .status {
        margin-top: 12px;
        font-size: 14px;
        opacity: 0.4;
      }
      .button {
        width: 160px;
        height: 45px;
        background: #1d88f8;
        border-radius: 5px;
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        margin-top: 16px;
        font-size: 15px;
        &:active {
          filter: brightness(1.2);
        }
      }
    </style>
