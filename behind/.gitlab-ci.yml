# 测试分支专属cicd逻辑

# 仅在 test 分支打包测试产物（使用 Runner 标签：test）

variables:
  # 提升 Node 堆内存上限，配合关闭 sourcemap 防止 OOM
  NODE_OPTIONS: "--max-old-space-size=5096"

workflow:
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: always
    - if: $CI_COMMIT_BRANCH == "test"
      when: always
    - when: never

stages:
  - build_test
  - deploy

before_script:
  - |
    set -Eeuo pipefail
    set -x
    export PATH="/usr/local/bin:$PATH"
    echo "Node: $(node -v)" || true
    echo "pnpm: $(pnpm -v)" || true
    # 拉取源码改为在 job 脚本内手动 clone，避免 Runner get_sources 阶段触发 EBADMSG

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - workspace/.pnpm-store/

# 构建前执行 Lint，独立 job，失败则阻止后续阶段

# 构建测试环境：apps/admin 的 test 包
admin_build_test:
  stage: build_test
  tags:
    - yesongTest
  variables:
    # 让 Runner 跳过获取源码，我们在脚本中手动 clone 到干净目录
    GIT_STRATEGY: "none"
  rules:
    - if: $CI_COMMIT_BRANCH == "test"
      changes:
        - apps/admin/*
        - apps/admin/**/*
        - packages/*
        - packages/**/*
      when: on_success
  script:
    # 手动克隆到全新工作目录，精确获取当前提交，避免 shallow clone 导致 checkout 失败
    - rm -rf workspace || true
    - git init workspace
    - cd workspace
    - git remote add origin "$CI_REPOSITORY_URL"
    - git fetch --no-tags --depth=1 origin "$CI_COMMIT_SHA" || git fetch --no-tags --depth=50 origin "$CI_COMMIT_REF_NAME"
    - git checkout -q "$CI_COMMIT_SHA" || git checkout -q "$CI_COMMIT_REF_NAME"
    - test -f .gitlab-ci-test.sh || { echo "当前提交缺少 .gitlab-ci-test.sh，列出根目录："; ls -la; }
    - chmod +x .gitlab-ci-test.sh
    - bash .gitlab-ci-test.sh
  artifacts:
    name: "admin-test-dist-${CI_COMMIT_SHORT_SHA}"
    paths:
      - workspace/apps/admin/dist/
    expire_in: 1 week
  environment:
    name: test

# 部署主分支：当 main 更新时，克隆/更新到 /www/wwwroot/$CI_PROJECT_NAME 并执行 pnpm i
deploy_main:
  stage: deploy
  tags:
    - yesongTest
  variables:
    GIT_STRATEGY: "none"  # 我们在脚本中手动 clone/update
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: on_success
  before_script:
    - |
      set -Eeuo pipefail
      set -x
      export PATH="/usr/local/bin:$PATH"
      echo "Runner user: $(whoami)"
      echo "Node: $(node -v)" || true
      echo "npm: $(npm -v)" || true
      echo "pnpm: $(pnpm -v)" || true
  script:
    - |
      projectName="${CI_PROJECT_NAME}"
      gitPath="/www/wwwroot/${projectName}"
      LOG_FILE="${gitPath}/deploy.log"

      # 统一日志输出函数：写入失败不终止，并提示原因
      log() {
        echo "$1" | tee -a "${LOG_FILE}" >/dev/null 2>&1 || {
          echo "$1"
          echo "[WARN] 无法写入日志文件：${LOG_FILE}（可能权限不足）"
        }
      }

      # 目标目录准备与权限诊断
      if [ ! -d "${gitPath}" ]; then
        if ! mkdir -p "${gitPath}"; then
          echo "[ERROR] 创建目录失败：${gitPath}"; ls -ld "$(dirname "${gitPath}")" || true; id || true; exit 1;
        fi
      fi
      if ! test -w "${gitPath}"; then
        echo "[ERROR] 目录不可写：${gitPath}"; ls -ld "/www" "/www/wwwroot" "${gitPath}" || true; id || true; groups || true; umask || true; exit 1;
      fi

      log "===== 部署开始 $(date -Iseconds) ====="
      log "项目: ${projectName}"
      log "分支: ${CI_COMMIT_REF_NAME}"
      log "提交: ${CI_COMMIT_SHA}"
      log "仓库URL: ${CI_REPOSITORY_URL}"
      log "目标路径: ${gitPath}"

      if [ -d "${gitPath}/.git" ]; then
        log "检测到已存在仓库，执行更新"
        git -C "${gitPath}" -c safe.directory="${gitPath}" remote -v | tee -a "${LOG_FILE}" || true
        git -C "${gitPath}" -c safe.directory="${gitPath}" fetch --prune origin main 2>&1 | tee -a "${LOG_FILE}" || true
        git -C "${gitPath}" -c safe.directory="${gitPath}" reset --hard origin/main 2>&1 | tee -a "${LOG_FILE}" || true
      else
        log "首次部署，开始克隆 main 分支"
        rm -rf "${gitPath}" || true
        git clone --depth=1 --branch main "${CI_REPOSITORY_URL}" "${gitPath}" 2>&1 | tee -a "${LOG_FILE}" || true
      fi

      log "进入目标目录"
      cd "${gitPath}"

      # 克隆/更新后，递归放宽项目根目录权限，避免后续写权限问题
      log "递归设置项目根权限为 777：${gitPath}"
      chmod -R 777 "${gitPath}" 2>&1 | tee -a "${LOG_FILE}" || log "[WARN] chmod 项目根失败，可能所有权不匹配"

      # 尝试激活 pnpm（优先 corepack，其次 npm 全局安装）
      if command -v corepack >/dev/null 2>&1; then
        corepack enable 2>&1 | tee -a "${LOG_FILE}" || true
        corepack prepare pnpm@latest --activate 2>&1 | tee -a "${LOG_FILE}" || true
      fi
      command -v pnpm >/dev/null 2>&1 || npm i -g pnpm 2>&1 | tee -a "${LOG_FILE}" || true
      log "pnpm 版本: $(pnpm -v)"

      # 切换到后端项目目录安装依赖
      BACKEND_DIR="${gitPath}/koa-typeScript-sequlize-swagger"
      if [ -d "${BACKEND_DIR}" ]; then
        log "进入后端目录并安装依赖：${BACKEND_DIR}"
        cd "${BACKEND_DIR}"
        # 安装前确保后端目录权限放宽
        log "递归设置后端目录权限为 777：${BACKEND_DIR}"
        chmod -R 777 "${BACKEND_DIR}" 2>&1 | tee -a "${LOG_FILE}" || log "[WARN] chmod 后端目录失败，可能所有权不匹配"
        # 清理旧依赖，避免历史 root 所有权导致安装时 chmod EPERM
        if [ -d "node_modules" ]; then
          log "清理旧依赖目录：node_modules"
          rm -rf node_modules 2>&1 | tee -a "${LOG_FILE}" || true
        fi
        pnpm i 2>&1 | tee -a "${LOG_FILE}"
        # 安装后对 node_modules 放宽权限，避免运行时权限问题
        if [ -d "node_modules" ]; then
          log "递归设置 node_modules 权限为 777"
          chmod -R 777 node_modules 2>&1 | tee -a "${LOG_FILE}" || log "[WARN] chmod node_modules 失败，可能所有权不匹配"
        fi
        log "后端依赖安装完成"
      else
        log "[ERROR] 未找到后端目录：${BACKEND_DIR}"
        ls -la "${gitPath}" | tee -a "${LOG_FILE}" || true
        exit 1
      fi

      log "===== 部署结束 $(date -Iseconds) ====="
  environment:
    name: production