<!doctype html>
<html lang="zh-cn" theme="dark" primary-color="cyan">
<head>
    <meta charset="UTF-8"/>
    <link rel="icon" href=""/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title></title>
    <style>
      * {
        box-sizing: border-box;
      }
      #app[data-mounted] + #app-loading {
        display: none;
      }
      #app-loading {
        position: fixed;
        z-index: 9999;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: #fff;
      }
      #app-loading .container {
        opacity: .6;
        position: relative;
        display: inline-block;
        padding: 30px;
        width: 60px;
        max-width: 420px;
        height: 140px;
        box-sizing: border-box;
        align-items: center;
      }
      #app-loading .line {
        position: absolute;
        top: 50%;
        left: 0;
        width: 60px;
        height: 4px;
        margin-left: 10px;
        background: var(--color-5);
        border-radius: 2px;
        transform: translateY(-50%);
        animation: spin 1.5s ease infinite;
      }
      #app-loading .line:nth-of-type(2) {
        animation-delay: 0.1s;
      }
      #app-loading .line:nth-of-type(3) {
        animation-delay: 0.2s;
      }
      #app-loading .line:nth-of-type(4) {
        animation-delay: 0.3s;
      }
      @keyframes spin {
        0% {
          transform: translateY(-50%) scaleX(0.6);
          opacity: 0.6;
        }
        25% {
          transform: translateY(-50%) scaleX(1);
          opacity: 1;
        }
        50% {
          transform: translateY(-50%) scaleX(0.8);
          opacity: 0.8;
        }
        75% {
          transform: translateY(-50%) scaleX(1);
          opacity: 1;
        }
        100% {
          transform: translateY(-50%) scaleX(0.6);
          opacity: 0.6;
        }
      }
      // loading
      .c_spin {
        font-size: 64px;
        width: 1em;
        height: 1em;
        position: relative;
      }
      .c_wave {
        position: relative;
        width: 100%;
        height: 100%;
      }
      .c_wave::before,
      .c_wave::after {
        content: "";
        position: absolute;
        top: 50%;
        left: 50%;
        width: 80%;
        height: 80%;
        border: 2px solid currentColor;
        border-radius: 50%;
        transform: translate(-50%, -50%) scale(0.45);
        opacity: 0.9;
        animation: c_wave_pulse 1.6s ease-out infinite;
      }
      .c_wave::after {
        animation-delay: 0.8s;
        opacity: 0.6;
      }
      .c_wave__dot {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 0.18em;
        height: 0.18em;
        background: none;
        border-radius: 50%;
        transform: translate(-50%, -50%);
      }
      @keyframes c_wave_pulse {
        0% {
          transform: translate(-50%, -50%) scale(0.45);
          opacity: 0.9;
        }
        70% {
          opacity: 0.15;
        }
        100% {
          transform: translate(-50%, -50%) scale(1);
          opacity: 0;
        }
      }
    </style>
</head>
<body>
<div id="app"></div>
<div id="app-loading">
    <div class="c_spin">
        <div class="c_wave">
            <div class="c_wave__dot"></div>
        </div>
    </div>
    <div class="container">
        <div class="line"></div>
        <div class="line"></div>
        <div class="line"></div>
        <div class="line"></div>
    </div>
</div>
<script type="module" src="/src/main.ts"></script>
</body>
</html>
